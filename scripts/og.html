<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: "Archivo", "Helvetica Neue", Arial, sans-serif; background: #0A1128; }
  .bg { position: absolute; inset: 0; background: url("../shots/og-base.png") center/cover; }
  .scrim { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(10,17,40,0.92) 0%, rgba(10,17,40,0.55) 46%, rgba(10,17,40,0.05) 75%); }
  .frame { position: absolute; inset: 22px; border: 2px solid rgba(95,212,245,0.55); }
  .content { position: absolute; left: 64px; top: 50%; transform: translateY(-50%); max-width: 620px; }
  .kicker { font-family: "IBM Plex Mono", "Courier New", monospace; font-size: 17px; letter-spacing: 0.45em; color: #5FD4F5; margin-bottom: 22px; }
  h1 { font-size: 74px; font-weight: 700; letter-spacing: -0.01em; color: #E8DCC8; line-height: 0.98; }
  .sub { font-size: 27px; color: #9FB4C8; margin-top: 20px; line-height: 1.35; }
  .chip { display: inline-block; font-family: "IBM Plex Mono", monospace; font-size: 15px; letter-spacing: 0.22em; color: #5FD4F5; border: 1.5px solid rgba(95,212,245,0.6); padding: 12px 18px; margin-top: 30px; background: rgba(10,17,40,0.6); }
  .corner { position: absolute; right: 44px; bottom: 40px; font-family: "IBM Plex Mono", monospace; font-size: 14px; letter-spacing: 0.3em; color: rgba(95,212,245,0.75); }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="frame"></div>
  <div class="content">
    <div class="kicker">BLUEPRINT CITY</div>
    <h1>JAWAHAR<br/>NAIDU</h1>
    <div class="sub">I build AI tools people actually use.<br/>A 3D city that compiles as you scroll.</div>
    <div class="chip">SEEKING: 12–24 MONTH APPRENTICESHIP · FRANCE</div>
  </div>
  <div class="corner">JAWAHARNAIDU.COM</div>
</body>
</html>
